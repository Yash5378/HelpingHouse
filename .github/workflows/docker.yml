name: Deploy to EC2

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: self-hosted  # EC2 instance with GitHub Actions runner installed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Server
          file: ./Server/docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/helperhouse-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./HelpingHouse
          file: ./HelpingHouse/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/helperhouse-frontend:latest
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}

      - name: Prepare deployment directory
        run: mkdir -p ~/app

      - name: Copy docker-compose.yml
        run: cp "${{ github.workspace }}/Server/docker/docker-compose.yml" ~/app/docker-compose.yml

      - name: Create .env file
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE }}
        run: echo "$ENV_CONTENT" > ~/app/.env

      - name: Deploy with Docker Compose
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          cd ~/app
          docker compose pull
          docker compose up -d --remove-orphans --force-recreate
          docker system prune -f

      - name: Run database migrations
        run: |
          sleep 15
          docker exec my_backend npm run db:push

      - name: Verify deployment
        run: docker ps --filter "name=my_" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
