name: Deploy to EC2

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend image
        run: |
          docker build \
            -t helperhouse-backend:latest \
            -f ./Server/docker/Dockerfile \
            ./Server

      - name: Build Frontend image
        run: |
          docker build \
            --build-arg VITE_BASE_URL=${{ secrets.VITE_BASE_URL }} \
            -t helperhouse-frontend:latest \
            -f ./HelpingHouse/Dockerfile \
            ./HelpingHouse

      - name: Prepare deployment directory
        run: mkdir -p ~/app

      - name: Copy docker-compose.yml
        run: cp "${{ github.workspace }}/Server/docker/docker-compose.yml" ~/app/docker-compose.yml

      - name: Create .env file
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE }}
        run: echo "$ENV_CONTENT" > ~/app/.env

      - name: Deploy with Docker Compose
        run: |
          cd ~/app
          docker compose up -d --remove-orphans --force-recreate
          docker image prune -f

      - name: Run database migrations
        run: |
          sleep 15
          docker exec my_backend npm run db:push

      - name: Verify deployment
        run: docker ps --filter "name=my_" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
