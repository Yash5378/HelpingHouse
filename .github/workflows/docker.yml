name: Deploy to EC2

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend image
        run: |
          docker build \
            -t helperhouse-backend:latest \
            -f ./Server/docker/Dockerfile \
            ./Server

      - name: Build Frontend image
        run: |
          docker build \
            --build-arg VITE_BASE_URL=${{ secrets.VITE_BASE_URL }} \
            -t helperhouse-frontend:latest \
            -f ./HelpingHouse/Dockerfile \
            ./HelpingHouse

      - name: Prepare deployment directory
        run: mkdir -p ~/app

      - name: Copy docker-compose.yml
        run: cp "${{ github.workspace }}/Server/docker/docker-compose.yml" ~/app/docker-compose.yml

      - name: Create .env file
        env:
          PORT: ${{ secrets.PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
        run: |
          {
            echo "PORT=$PORT"
            echo "DATABASE_URL=$DATABASE_URL"
            echo "POSTGRES_USER=$POSTGRES_USER"
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD"
            echo "POSTGRES_DB=$POSTGRES_DB"
            echo "DB_HOST=$DB_HOST"
            echo "DB_PORT=$DB_PORT"
            echo "DB_NAME=$DB_NAME"
            echo "DB_USER=$DB_USER"
            echo "DB_PASSWORD=$DB_PASSWORD"
            echo "JWT_SECRET=$JWT_SECRET"
            echo "JWT_EXPIRES_IN=$JWT_EXPIRES_IN"
            echo "CLIENT_URL=$CLIENT_URL"
          } > ~/app/.env

      - name: Deploy with Docker Compose
        run: |
          cd ~/app
          docker-compose up -d --remove-orphans --force-recreate
          docker image prune -f

      - name: Run database migrations
        run: |
          sleep 15
          docker exec my_backend npm run db:push

      - name: Verify deployment
        run: docker ps --filter "name=my_" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
