services:
  postgres:
    image: postgres:15
    container_name: my_postgres
    restart: always
    env_file:
      - ../.env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    image: yash2244/helperhouse-backend:latest   # 👈 change yash5378 to your username
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: my_backend
    restart: always
    env_file:
      - ../.env
    depends_on:
      - postgres
    networks:
      - app-network

  frontend:
    image: yash2244/helperhouse-frontend:latest   # 👈 change yash2244 to your username
    build:
      context: ../../HelpingHouse
      dockerfile: Dockerfile
    container_name: my_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pg_data: